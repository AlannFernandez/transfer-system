services:
  api:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: wallet_api
    restart: unless-stopped
    working_dir: /var/www/api
    volumes:
      - ./api:/var/www/api
    networks:
      - wallet_network

  webserver:
    image: nginx:alpine
    container_name: wallet_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - wallet_network

  db:
    image: mysql:8.0
    container_name: wallet_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wallet_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: wallet_user
      MYSQL_PASSWORD: wallet_password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - wallet_network

  redis:
    image: redis:alpine
    container_name: wallet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - wallet_network
  app:
    build:
      context: ./app
      dockerfile: ../docker/app/Dockerfile
    container_name: wallet_app
    restart: unless-stopped
    ports:
      - "8081:8081"   # Metro Bundler Server
      - "19000:19000" # Expo Dev Server
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=10.0.2.2
      - API_URL=http://webserver:80/api
    networks:
      - wallet_network
    stdin_open: true
    tty: true
networks:
  wallet_network:
    driver: bridge

volumes:
  dbdata:
    driver: local